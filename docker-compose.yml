services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutoria_backend
    working_dir: /app
    command: "python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutoria_frontend
    working_dir: /app
    command: npm run dev
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: tutoria_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutoria_academico}
      POSTGRES_USER: ${POSTGRES_USER:-tutoria_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutoria_user} -d ${POSTGRES_DB:-tutoria_academico}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
