services:
  backend:
    image: python:3.12-slim
    container_name: tutoria_backend
    working_dir: /app
    command: sh -c "echo 'Sprint 0: backend base pendiente para Sprint 1' && sleep infinity"
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: tutoria_frontend
    working_dir: /app
    command: sh -c "echo 'Sprint 0: frontend base pendiente para Sprint 1' && sleep infinity"
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: tutoria_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutoria_academico}
      POSTGRES_USER: ${POSTGRES_USER:-tutoria_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
